<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS SORT — Unconventional Algorithms</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #2a2a3a;
    --accent: #ff3c5f;
    --accent2: #ffdd00;
    --accent3: #00e5ff;
    --text: #e8e8f0;
    --muted: #6a6a8a;
    --bar-default: #2a2a4a;
    --bar-active: #ff3c5f;
    --bar-compare: #ffdd00;
    --bar-sorted: #a3e635;
    --bar-eliminated: #3a1a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  header {
    padding: 1rem 2.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 1;
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .main {
    display: grid;
    grid-template-columns: 240px 1fr;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    min-height: 0;
  }

  /* Custom scrollbar for sidebar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .sidebar-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-sep {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0.4rem 0;
    flex-shrink: 0;
  }

  .sidebar-sep::before,
  .sidebar-sep::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .sidebar-sep span {
    font-size: 0.52rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent);
    white-space: nowrap;
  }

  .algo-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 0.6rem 0.75rem 0.6rem 1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.1rem;
    flex-shrink: 0;
  }

  .algo-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.15s;
  }

  .algo-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .algo-btn.active {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(255, 60, 95, 0.05);
  }

  .algo-btn.active::before { transform: scaleY(1); }

  .algo-btn .algo-name {
    display: block;
    font-weight: 700;
    font-size: 0.8rem;
    margin-bottom: 0.2rem;
    color: var(--text);
  }

  .algo-btn.active .algo-name { color: var(--accent2); }

  .complexity {
    font-size: 0.6rem;
    color: var(--accent3);
    margin-top: 0.2rem;
  }

  /* Main content */
  .content {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
  }

  /* Custom scrollbar for content */
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .content::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .viz-header {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .algo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--accent2);
    letter-spacing: 0.05em;
  }

  .algo-desc {
    font-size: 0.65rem;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.6;
    flex: 1;
  }

  .analysis-wrap {
    width: 100%;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
  }

  .analysis-wrap[open] .analysis-chevron { transform: rotate(180deg); }

  .analysis-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 2rem;
    cursor: pointer;
    list-style: none;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    user-select: none;
    transition: color 0.15s;
  }

  .analysis-toggle::-webkit-details-marker { display: none; }
  .analysis-toggle:hover { color: var(--text); }

  .analysis-chevron {
    font-size: 1.4rem;
    line-height: 1;
    transition: transform 0.2s ease;
    display: inline-block;
    color: var(--accent);
  }

  .algo-analysis {
    width: 100%;
    padding: 0.75rem 2rem 1rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem 2rem;
    border-top: 1px solid var(--border);
  }

  .analysis-block { display: flex; flex-direction: column; gap: 0.25rem; }

  .analysis-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  .analysis-value {
    font-size: 0.72rem;
    color: var(--accent3);
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  .analysis-note {
    font-size: 0.62rem;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 0.1rem;
  }

  .rating-bar {
    display: flex;
    gap: 3px;
    margin-top: 3px;
  }

  .rating-pip {
    width: 14px; height: 6px;
    border-radius: 1px;
    background: var(--border);
  }

  .rating-pip.on { background: var(--accent); }

  /* ── Code Panel ─────────────────────────────────────── */
  .code-wrap {
    width: 100%;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
  }

  .code-wrap[open] .analysis-chevron { transform: rotate(180deg); }

  .code-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 2rem;
    cursor: pointer;
    list-style: none;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    user-select: none;
    transition: color 0.15s;
  }

  .code-toggle::-webkit-details-marker { display: none; }
  .code-toggle:hover { color: var(--text); }

  .code-panel {
    border-top: 1px solid var(--border);
    background: #1e1e2e;
    padding: 1.25rem 1.5rem;
    overflow-x: auto;
  }

  .code-block {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
    margin: 0;
    white-space: pre;
    color: #cdd6f4;
  }

  /* PyCharm Darcula-inspired token colours */
  .tok-kw     { color: #cba6f7; }  /* keyword: def, return, while, if, for, in, not */
  .tok-fn     { color: #89b4fa; }  /* function name */
  .tok-bi     { color: #89dceb; }  /* builtin: len, range, print, sorted */
  .tok-str    { color: #a6e3a1; }  /* strings */
  .tok-num    { color: #fab387; }  /* numbers */
  .tok-cm     { color: #585b70; font-style: italic; }  /* comments */
  .tok-op     { color: #89dceb; }  /* operators: =, -, +, *, // */
  .tok-punc   { color: #cdd6f4; }  /* punctuation: () [] : , */
  .tok-self   { color: #f38ba8; }  /* not used here but handy */
  .tok-bool   { color: #fab387; }  /* True, False, None */

  .controls {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 0.5rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .ctrl-btn.primary:hover { background: #ff6080; }
  .ctrl-btn.stop { background: none; border-color: #ff8c00; color: #ff8c00; }
  .ctrl-btn.stop:hover { background: rgba(255,140,0,0.12); border-color: #ffaa33; color: #ffaa33; }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #stopBtn { display: none; }

  .size-control {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .size-control input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
  }

  /* Visualizer */
  .viz-area {
    padding: 1rem 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    position: relative;
    height: 260px;
    flex-shrink: 0;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .stats-bar {
    display: flex;
    gap: 2rem;
    padding: 0.75rem 0;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .stat-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent2);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.05em;
  }

  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.75rem 1rem;
    font-size: 0.65rem;
    color: var(--muted);
    height: 60px;
    overflow: hidden;
    position: relative;
  }

  .log-line {
    color: var(--accent3);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  .status-dot.running { background: var(--accent); animation: pulse 0.6s infinite alternate; }
  .status-dot.done { background: #a3e635; }

  @keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }

  .legend {
    display: flex;
    gap: 1.5rem;
    font-size: 0.6rem;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  @media (max-width: 700px) {
    body { height: auto; overflow: auto; }

    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: auto;
      overflow: visible;
    }

    .sidebar {
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      height: auto;
      min-height: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 0.75rem;
      gap: 0.5rem;
      /* Stop page scroll interfering */
      overscroll-behavior-x: contain;
    }

    .sidebar-label { display: none; }

    .algo-btn {
      min-width: 120px;
      min-height: 52px;
      flex-shrink: 0;
      justify-content: center;
    }

    .algo-btn .algo-name {
      font-size: 0.7rem;
      white-space: nowrap;
    }

    .complexity { font-size: 0.55rem; }

    .content {
      height: auto;
      overflow: visible;
      min-height: 0;
    }

    .viz-header {
      padding: 1rem;
      flex-wrap: wrap;
    }

    .controls {
      margin-left: 0;
      width: 100%;
    }

    .viz-area { padding: 0.75rem 1rem 1rem; }

    .canvas-wrap { height: 200px; }
  }
</style>
</head>
<body>

<header>
  <h1>CHAOS SORT</h1>
  <span class="subtitle">Unconventional Sorting Algorithms Visualizer</span>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-label">efficient</div>
    <!-- Buttons injected by JS -->
  </aside>

  <section class="content">
    <div class="viz-header">
      <div>
        <div class="algo-title" id="algoTitle">BOGO SORT</div>
        <div class="algo-desc" id="algoDesc"></div>
      </div>
      <div class="controls">
        <div class="size-control">
          <span>SIZE</span>
          <input type="range" id="sizeSlider" min="8" max="60" value="20">
          <span id="sizeVal">20</span>
        </div>
        <div class="size-control">
          <span>SPEED</span>
          <input type="range" id="speedSlider" min="0" max="4" value="2" step="1">
          <span id="speedVal">Normal</span>
        </div>
        <button class="ctrl-btn" id="resetBtn">↺ Reset</button>
        <button class="ctrl-btn stop" id="stopBtn">■ Stop</button>
        <button class="ctrl-btn primary" id="startBtn">▶ Sort</button>
      </div>
    </div>
    <details class="analysis-wrap" id="analysisDetails">
      <summary class="analysis-toggle">
        <span id="analysisSummaryText">Complexity Analysis</span>
        <span class="analysis-chevron">▾</span>
      </summary>
      <div class="algo-analysis" id="algoAnalysis"></div>
    </details>

    <div class="viz-area">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="viz"></canvas>
      </div>

      <div class="stats-bar">
        <div class="stat"><div class="stat-label">Comparisons</div><div class="stat-value" id="statComp">0</div></div>
        <div class="stat"><div class="stat-label">Swaps</div><div class="stat-value" id="statSwap">0</div></div>
        <div class="stat"><div class="stat-label">Operations</div><div class="stat-value" id="statOps">0</div></div>
        <div class="stat"><div class="stat-label">Status</div><div class="stat-value" style="font-size:0.75rem;font-family:'Space Mono'">
          <span class="status-dot" id="statusDot"></span><span id="statusText">Ready</span>
        </div></div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2a2a4a;border:1px solid #4a4a6a"></div>Default</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-active)"></div>Active/Moving</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-compare)"></div>Comparing</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-sorted)"></div>Sorted/Kept</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bar-eliminated)"></div>Eliminated</div>
      </div>

      <div class="log" id="log">
        <span class="log-line">// Select an algorithm and press Sort</span>
      </div>

      <details class="code-wrap">
        <summary class="code-toggle">
          <span>Python Implementation</span>
          <span class="analysis-chevron">▾</span>
        </summary>
        <div class="code-panel">
          <pre class="code-block" id="codeBlock"></pre>
        </div>
      </details>
    </div>
  </section>
</div>

<script>
// ─── ALGORITHMS ──────────────────────────────────────────────────────────────

const ALGORITHMS = {
  mergesort: {
    name: 'Merge Sort',
    complexity: 'O(n log n)',
    desc: 'Divide the array in half recursively until you have single elements, then merge the halves back together in sorted order. Elegant, stable, and guaranteed fast.',
    analysis: {
      best:    { value: 'O(n log n)', note: 'Always divides and merges the same way regardless of input — no shortcuts even on already-sorted data.' },
      average: { value: 'O(n log n)', note: 'The divide step always produces log n levels, and each level does O(n) work merging. Consistent and predictable.' },
      worst:   { value: 'O(n log n)', note: 'Unlike Quick Sort, there is no bad pivot — the worst case is identical to the average. Guaranteed performance.' },
      space:   { value: 'O(n)', note: 'Requires an auxiliary array of size n for the merge step. The main downside compared to in-place sorts.' },
      stability: 'Stable',
      practical: 5,
      practicalNote: 'One of the most widely used sorts in practice. Used in Python\'s Timsort, Java\'s Arrays.sort for objects, and most standard library stable sorts. Ideal when stability matters.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      let placements = 0;

      // Bottom-up merge sort — no recursion, no snapshot issues
      // Each pass merges sub-arrays of increasing width
      for (let width = 1; width < n; width *= 2) {
        for (let l = 0; l < n; l += 2 * width) {
          const m = Math.min(l + width - 1, n - 1);
          const r = Math.min(l + 2 * width - 1, n - 1);
          if (m >= r) continue;

          yield { type: 'recurse', l, h: r, msg: `Merging [${l}..${m}] and [${m+1}..${r}]` };

          // Copy the two halves
          const left  = arr.slice(l, m + 1);
          const right = arr.slice(m + 1, r + 1);
          let i = 0, j = 0, k = l;

          while (i < left.length && j < right.length) {
            yield { type: 'compare', l: k, h: m + 1 + j, msg: `Comparing ${left[i]} and ${right[j]}` };
            if (left[i] <= right[j]) {
              arr[k++] = left[i++];
            } else {
              arr[k++] = right[j++];
            }
            placements++;
            yield { type: 'swap', l: k - 1, h: k - 1, msg: `Placed ${arr[k-1]} at position ${k-1}`, swaps: placements };
          }
          while (i < left.length) {
            arr[k++] = left[i++];
            placements++;
            yield { type: 'swap', l: k-1, h: k-1, msg: `Placed ${arr[k-1]} at position ${k-1}`, swaps: placements };
          }
          while (j < right.length) {
            arr[k++] = right[j++];
            placements++;
            yield { type: 'swap', l: k-1, h: k-1, msg: `Placed ${arr[k-1]} at position ${k-1}`, swaps: placements };
          }
        }
      }

      yield { type: 'done', msg: `Merge sort complete! ${placements} placements.` };
    }
  },

  quicksort: {
    name: 'Quick Sort',
    complexity: 'O(n log n) avg',
    desc: 'Pick a pivot, partition everything smaller to its left and larger to its right, then recurse on both halves. Fast in practice, beautiful to watch.',
    analysis: {
      best:    { value: 'O(n log n)', note: 'When the pivot always lands near the middle, the recursion tree has log n levels each doing O(n) partition work.' },
      average: { value: 'O(n log n)', note: 'With random or median-of-three pivot selection, the average partition is good enough to maintain O(n log n) across virtually all real inputs.' },
      worst:   { value: 'O(n²)',      note: 'If the pivot is always the smallest or largest element (e.g. sorted input with a naive pivot), the recursion degrades to n levels — hence the O(n²) worst case.' },
      space:   { value: 'O(log n)',   note: 'In-place partitioning needs no auxiliary array. The O(log n) space is just the recursion call stack depth.' },
      stability: 'Unstable',
      practical: 5,
      practicalNote: 'The fastest general-purpose sort in practice due to excellent cache performance. Used in C\'s qsort, C++ std::sort, and most language runtimes for primitive types. The gold standard.'
    },
    async* run(arr, mark) {
      const steps = [];

      function partition(a, low, high) {
        const mid = Math.floor((low + high) / 2);
        if (a[mid] < a[low]) { [a[low], a[mid]] = [a[mid], a[low]]; steps.push({ type: 'swap', l: low, h: mid, arr: [...a], msg: `Median pivot swap` }); }
        if (a[high] < a[low]) { [a[low], a[high]] = [a[high], a[low]]; steps.push({ type: 'swap', l: low, h: high, arr: [...a], msg: `Median pivot swap` }); }
        if (a[mid] < a[high]) { [a[mid], a[high]] = [a[high], a[mid]]; steps.push({ type: 'swap', l: mid, h: high, arr: [...a], msg: `Median pivot swap` }); }
        const pivot = a[high];
        steps.push({ type: 'pivot', idx: high, arr: [...a], msg: `Pivot chosen: ${pivot} at index ${high}` });
        let i = low - 1;
        for (let j = low; j < high; j++) {
          steps.push({ type: 'compare', l: j, h: high, arr: [...a], msg: `Comparing ${a[j]} with pivot ${pivot}` });
          if (a[j] <= pivot) {
            i++;
            [a[i], a[j]] = [a[j], a[i]];
            steps.push({ type: 'swap', l: i, h: j, arr: [...a], msg: `${a[i]} ≤ pivot, swapping indices ${i} and ${j}` });
          }
        }
        [a[i + 1], a[high]] = [a[high], a[i + 1]];
        steps.push({ type: 'swap', l: i + 1, h: high, arr: [...a], msg: `Pivot ${pivot} settled at index ${i + 1}` });
        return i + 1;
      }

      function quickSort(a, low, high) {
        if (low < high) {
          const pi = partition(a, low, high);
          steps.push({ type: 'partitioned', pi, low, high, arr: [...a], msg: `Partition done. Pivot at ${pi}. Recursing on [${low}..${pi-1}] and [${pi+1}..${high}]` });
          quickSort(a, low, pi - 1);
          quickSort(a, pi + 1, high);
        }
      }

      quickSort(arr, 0, arr.length - 1);

      let swapCount = 0;
      for (const step of steps) {
        arr.length = 0;
        step.arr.forEach(v => arr.push(v));
        if (step.type === 'compare') {
          yield { type: 'compare', l: step.l, h: step.h, msg: step.msg };
        } else if (step.type === 'swap') {
          swapCount++;
          yield { type: 'swap', l: step.l, h: step.h, msg: step.msg, swaps: swapCount };
        } else if (step.type === 'pivot') {
          yield { type: 'find-max', maxIdx: step.idx, msg: step.msg };
        } else if (step.type === 'partitioned') {
          yield { type: 'recurse', l: step.low, h: step.high, msg: step.msg };
        }
      }
      yield { type: 'done', msg: `Quick sort complete! ${swapCount} swaps.` };
    }
  },

  bogo: {
    name: 'Bogo Sort',
    complexity: 'O((n+1)!) avg',
    desc: 'Randomly shuffles the array until it happens to be sorted. Statistically cursed. Theoretically works. Practically never.',
    analysis: {
      best:    { value: 'O(n)',       note: 'Lucky — the array is already sorted on the first check.' },
      average: { value: 'O((n+1)!)', note: 'Expected number of shuffles is (n+1)!, which grows faster than exponential. For n=10 that\'s ~40 million attempts on average.' },
      worst:   { value: 'O(∞)',       note: 'Theoretically infinite — there is no guaranteed upper bound. It could shuffle forever and never land on sorted order.' },
      space:   { value: 'O(1)',       note: 'Sorts in-place. No extra memory beyond a few loop variables.' },
      stability: 'Unstable',
      practical: 1,
      practicalNote: 'Completely impractical. Even n=12 would take millions of shuffles on average. Used purely as a joke/teaching example.'
    },
    async* run(arr, mark) {
      function isSorted(a) {
        for (let i = 0; i < a.length - 1; i++) if (a[i] > a[i+1]) return false;
        return true;
      }
      function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
      }
      let attempts = 0;
      while (!isSorted(arr)) {
        shuffle(arr);
        attempts++;
        yield { type: 'shuffle', msg: `Attempt #${attempts} — still not sorted 😤`, swaps: arr.length };
        if (attempts > 2000) { yield { type: 'bail', msg: 'Giving up after 2000 attempts (you\'re welcome)' }; return; }
      }
      yield { type: 'done', msg: `Sorted after ${attempts} shuffles!` };
    }
  },

  stalin: {
    name: 'Stalin Sort',
    complexity: 'O(n) — brutally',
    desc: 'Any element that is not in order is immediately removed (eliminated). The remaining elements are sorted by definition. Efficient. Uncompromising.',
    analysis: {
      best:    { value: 'O(n)', note: 'Always a single pass — every element is visited exactly once regardless of input.' },
      average: { value: 'O(n)', note: 'Perfectly linear. No comparisons are ever revisited. The algorithm never backtracks.' },
      worst:   { value: 'O(n)', note: 'Even in the worst case (descending order), it\'s still one pass — it just eliminates everything except the first element.' },
      space:   { value: 'O(1)', note: 'In-place elimination. No auxiliary array needed — elements are simply flagged and ignored.' },
      stability: 'N/A',
      practical: 2,
      practicalNote: 'Fast but destructive — it doesn\'t actually sort, it deletes. You lose most of your data. Only "works" if you redefine what sorted means.'
    },
    async* run(arr, mark) {
      const eliminated = new Array(arr.length).fill(false);
      let kept = [0];
      yield { type: 'start', msg: 'Beginning purge. Index 0 is loyal by default.' };
      for (let i = 1; i < arr.length; i++) {
        yield { type: 'compare', indices: [kept[kept.length-1], i], msg: `Checking [${i}]: ${arr[i]} vs last kept ${arr[kept[kept.length-1]]}` };
        if (arr[i] >= arr[kept[kept.length-1]]) {
          kept.push(i);
          yield { type: 'keep', indices: kept, eliminated, msg: `[${i}] = ${arr[i]} is loyal. Kept.` };
        } else {
          eliminated[i] = true;
          yield { type: 'eliminate', indices: kept, eliminated, msg: `[${i}] = ${arr[i]} is a traitor. ELIMINATED.` };
        }
      }
      yield { type: 'done', indices: kept, eliminated, msg: `${kept.length} elements survived. ${arr.length - kept.length} were eliminated.` };
    }
  },

  thanos: {
    name: 'Thanos Sort',
    complexity: 'O(n log n) snaps',
    desc: 'Perfectly balanced, as all things should be. Repeatedly snaps away half the elements — the largest half — until the array is sorted or only one element remains.',
    analysis: {
      best:    { value: 'O(n log n)', note: 'Each snap halves the remaining elements after an O(n) sort step to find the largest half, giving O(n log n) total work.' },
      average: { value: 'O(n log n)', note: 'Consistently O(n log n) — log n snaps are always needed to reduce n elements to 1, each requiring a linear scan.' },
      worst:   { value: 'O(n log n)', note: 'No worse case — the halving is deterministic. Ironically one of the more consistent algorithms here.' },
      space:   { value: 'O(n)',       note: 'Needs an auxiliary sorted copy of the active indices to determine which half to eliminate each snap.' },
      stability: 'Unstable',
      practical: 2,
      practicalNote: 'Like Stalin Sort, it achieves "sorted" by removal, not rearrangement. You\'re left with at most 1 element. Great for universe balancing, terrible for data.'
    },
    async* run(arr, mark) {
      const eliminated = new Array(arr.length).fill(false);
      let activeIndices = arr.map((_, i) => i);
      let snap = 0;

      function isSorted(indices) {
        for (let i = 0; i < indices.length - 1; i++)
          if (arr[indices[i]] > arr[indices[i+1]]) return false;
        return true;
      }

      while (!isSorted(activeIndices) && activeIndices.length > 1) {
        snap++;
        const half = Math.floor(activeIndices.length / 2);
        // Sort active by value, eliminate the bigger half
        const sorted = [...activeIndices].sort((a,b) => arr[b] - arr[a]);
        const toElim = sorted.slice(0, half);
        toElim.forEach(i => eliminated[i] = true);
        yield { type: 'snap', eliminated, activeIndices, msg: `Snap #${snap} — ${toElim.length} elements dusted. Perfectly balanced.` };
        activeIndices = activeIndices.filter(i => !eliminated[i]);
        yield { type: 'after-snap', eliminated, activeIndices, msg: `${activeIndices.length} elements remain.` };
      }
      yield { type: 'done', eliminated, activeIndices, msg: isSorted(activeIndices) ? 'Balance achieved.' : 'One remains. The universe is at peace.' };
    }
  },

  sleep: {
    name: 'Sleep Sort',
    complexity: 'O(max(arr)) time',
    desc: 'Each element schedules itself to be placed after sleeping for its own value in milliseconds. Smaller values wake up first. It just... works.',
    analysis: {
      best:    { value: 'O(max(n))', note: 'Total wall-clock time is determined by the largest value in the array, not the number of elements.' },
      average: { value: 'O(max(n))', note: 'Regardless of array size, sorting completes in time proportional to the maximum value. 1000 tiny numbers finish faster than 2 huge ones.' },
      worst:   { value: 'O(max(n))', note: 'If the largest value is enormous (e.g. 1,000,000), you\'re waiting a long time even for a 3-element array.' },
      space:   { value: 'O(n)',      note: 'Spawns n concurrent timers, each holding a reference to its value and index.' },
      stability: 'Unstable',
      practical: 2,
      practicalNote: 'Surprisingly works in practice for small integer arrays, but completely breaks for large values, duplicate values, or floats. Parallelism-dependent and non-deterministic.'
    },
    async* run(arr, mark) {
      const sorted = [];
      const wake_order = [];

      yield { type: 'start', msg: `All ${arr.length} elements going to sleep... 💤` };

      // Fire all timers concurrently — each sleeps proportional to its value
      // Use a small multiplier (40ms) so it completes in reasonable time
      const MULTIPLIER = 40;
      await new Promise(resolve => {
        let done = 0;
        arr.forEach((val, origIdx) => {
          setTimeout(() => {
            wake_order.push({ val, origIdx });
            done++;
            if (done === arr.length) resolve();
          }, val * MULTIPLIER);
        });
      });

      // Now replay the wake order as visual steps
      const placedFlags = new Array(arr.length).fill(false);
      for (let pos = 0; pos < wake_order.length; pos++) {
        const { val, origIdx } = wake_order[pos];
        sorted.push(origIdx);
        placedFlags[origIdx] = true;
        // Write sorted values back into arr so the bars show sorted order building up
        arr[pos] = val;
        yield { type: 'sleep-place', output: [...sorted], placed: [...placedFlags], msg: `${val} woke up → placed at position ${pos}` };
      }

      yield { type: 'done', msg: 'Everyone woke up in order. 🌅' };
    }
  },

  miracle: {
    name: 'Miracle Sort',
    complexity: 'O(∞) hoped',
    desc: 'Checks if the array is sorted. If not, waits and checks again. Relies entirely on cosmic rays flipping the right bits in memory. Inspirational.',

    },

  },

  gnome: {
    name: 'Gnome Sort',
    complexity: 'O(n²)',
    desc: 'A gnome sorts flower pots. If the current pot is in the right place, move forward. Otherwise, swap with the previous pot and step back. Simple gnome logic.',
    analysis: {
      best:    { value: 'O(n)',  note: 'If the array is already sorted, the gnome walks straight through without a single swap — just n forward steps.' },
      average: { value: 'O(n²)', note: 'On a random array, the gnome spends a lot of time walking backwards fixing out-of-place elements, averaging quadratic time.' },
      worst:   { value: 'O(n²)', note: 'Reverse-sorted input is the worst case — every insertion requires the gnome to walk all the way back to position 0 and then forward again.' },
      space:   { value: 'O(1)', note: 'In-place. Only needs a position pointer — no auxiliary storage at all.' },
      stability: 'Stable',
      practical: 3,
      practicalNote: 'Equivalent to insertion sort but implemented differently. Genuinely usable for small arrays or nearly-sorted data. Simple enough to implement from memory.'
    },
    async* run(arr, mark) {
      let pos = 0;
      let swaps = 0;
      while (pos < arr.length) {
        if (pos === 0 || arr[pos] >= arr[pos - 1]) {
          yield { type: 'move', pos, msg: `Gnome at pos ${pos}: ${arr[pos]} ≥ ${arr[pos-1] ?? '—'}. Moving forward.` };
          pos++;
        } else {
          yield { type: 'compare', pos, msg: `Gnome at pos ${pos}: ${arr[pos]} < ${arr[pos-1]}. Swapping!` };
          [arr[pos], arr[pos-1]] = [arr[pos-1], arr[pos]];
          swaps++;
          yield { type: 'swap', pos, msg: `Swapped. Gnome steps back.`, swaps };
          pos--;
        }
      }
      yield { type: 'done', msg: `Gnome finished! ${swaps} swaps.` };
    }
  },

  stooge: {
    name: 'Stooge Sort',
    complexity: 'O(n^2.71)',
    desc: 'Sort the first 2/3, then the last 2/3, then the first 2/3 again. Recursively. It is provably correct. It is also provably silly.',
    analysis: {
      best:    { value: 'O(n^2.71)', note: 'No best case optimisation — it always performs all three recursive calls regardless of whether the data is already sorted.' },
      average: { value: 'O(n^2.71)', note: 'The recurrence T(n) = 3T(2n/3) + O(1) solves to O(n^log₁.₅(3)) ≈ O(n^2.71). Worse than bubble sort\'s O(n²).' },
      worst:   { value: 'O(n^2.71)', note: 'Always the same. Stooge sort has no awareness of input order and blindly recurses every time.' },
      space:   { value: 'O(log n)', note: 'Recursive call stack depth is O(log₁.₅ n) ≈ O(log n). No auxiliary arrays needed.' },
      stability: 'Unstable',
      practical: 2,
      practicalNote: 'Intentionally bad. Slower than bubble sort, shell sort, and insertion sort. Named after the Three Stooges. Its only virtue is being a memorable recursion example.'
    },
    async* run(arr, mark) {
      const steps = [];
      function stooge(a, l, h) {
        if (a[l] > a[h]) {
          steps.push({type:'swap', l, h, arr:[...a]});
          [a[l], a[h]] = [a[h], a[l]];
        }
        if (h - l + 1 > 2) {
          const t = Math.floor((h - l + 1) / 3);
          steps.push({type:'recurse', l, h, t, arr:[...a]});
          stooge(a, l, h - t);
          stooge(a, l + t, h);
          stooge(a, l, h - t);
        }
      }
      stooge(arr, 0, arr.length - 1);
      let i = 0;
      for (const step of steps) {
        arr.length = 0;
        step.arr.forEach(v => arr.push(v));
        i++;
        yield { type: step.type, l: step.l, h: step.h, msg: step.type === 'swap' ? `Swapping indices ${step.l} & ${step.h}` : `Recursing on [${step.l}..${step.h}]` };
      }
      yield { type: 'done', msg: `Done! ${steps.length} operations total.` };
    }
  },

  pancake: {
    name: 'Pancake Sort',
    complexity: 'O(n²) flips',
    desc: 'You can only sort by flipping the top k elements of the stack (reversing a prefix). Like sorting a stack of pancakes with a spatula. Breakfast computing.',
    analysis: {
      best:    { value: 'O(n)',  note: 'If the array is already sorted, no flips are needed — the maximum element is always already in place for each sub-array.' },
      average: { value: 'O(n²)', note: 'Each of the n passes requires finding the maximum (O(n)) and at most 2 flips. Total flips ≤ 2(n−1), but the scan cost dominates.' },
      worst:   { value: 'O(n²)', note: 'At most 2n−3 flips are ever needed (proven). The O(n²) comes from the linear scans to find the maximum in each pass.' },
      space:   { value: 'O(1)', note: 'All flips are in-place reversals of a prefix. No extra memory beyond loop counters.' },
      stability: 'Unstable',
      practical: 3,
      practicalNote: 'Has real theoretical interest — finding the minimum number of flips is an NP-hard problem (the "burnt pancake problem"). Bill Gates co-authored a paper on it in 1979.'
    },
    async* run(arr, mark) {
      let flips = 0;
      function flip(a, k) {
        let l = 0, r = k;
        while (l < r) { [a[l], a[r]] = [a[r], a[l]]; l++; r--; }
      }
      for (let size = arr.length; size > 1; size--) {
        let maxIdx = 0;
        for (let i = 1; i < size; i++) {
          if (arr[i] > arr[maxIdx]) maxIdx = i;
        }
        if (maxIdx !== size - 1) {
          if (maxIdx !== 0) {
            yield { type: 'find-max', maxIdx, size, msg: `Max in range: ${arr[maxIdx]} at ${maxIdx}. Flipping to top.` };
            flip(arr, maxIdx);
            flips++;
            yield { type: 'flip', maxIdx: 0, size, msg: `Flipped top ${maxIdx+1}. Max is now at top.` };
          }
          flip(arr, size - 1);
          flips++;
          yield { type: 'flip', maxIdx: size-1, size, msg: `Flipped top ${size}. Max settled at position ${size-1}.` };
        }
      }
      yield { type: 'done', msg: `Sorted with ${flips} flips! 🥞` };
    }
  },

  genghis: {
    name: 'Genghis Khan Sort',
    complexity: 'O(n)',
    desc: 'Conquer everything. Keep only the first element, then repopulate the array with its successive integers. The result is always sorted — because you rewrote history.',
    analysis: {
      best:    { value: 'O(n)', note: 'Always a single pass to eliminate, then n-1 assignments to repopulate. No comparisons needed.' },
      average: { value: 'O(n)', note: 'Perfectly linear regardless of input. The original data is irrelevant — it is all destroyed anyway.' },
      worst:   { value: 'O(n)', note: 'No worst case. The algorithm is indifferent to input order. It simply does not care about your data.' },
      space:   { value: 'O(1)', note: 'In-place conquest. The array is overwritten directly with no auxiliary storage.' },
      stability: 'N/A',
      practical: 1,
      practicalNote: 'Does not sort your data at all — it replaces it entirely. Only "works" if you wanted the array [first, first+1, first+2, ...] all along. Destructive beyond recovery.'
    },
    async* run(arr, mark) {
      const first = arr[0];
      const n = arr.length;
      yield { type: 'start', msg: `The Khan surveys ${n} elements. Only ${first} shall remain.` };

      // Eliminate everything except index 0
      for (let i = 1; i < n; i++) {
        eliminated[i] = true;
        yield { type: 'eliminate', eliminated: [...eliminated], indices: [0], msg: `Eliminating index ${i} (value ${arr[i]})...` };
      }

      yield { type: 'conquer', msg: `All eliminated. Repopulating from ${first}...` };

      // Repopulate with successors
      for (let i = 1; i < n; i++) {
        eliminated[i] = false;
        arr[i] = first + i;
        yield { type: 'keep', indices: Array.from({length: i+1}, (_, k) => k), eliminated: [...eliminated], msg: `Position ${i} → ${arr[i]}` };
      }

      yield { type: 'done', msg: `Conquest complete. Array is now [${first}..${first + n - 1}]. 🏇` };
    }
  },

  oddpurge: {
    name: 'Odd Purge Sort',
    complexity: 'O(n) maybe',
    desc: 'Delete every element at an odd index. The remaining even-indexed elements may or may not be sorted. Results are chaotic. Nobody said it was fair.',
    analysis: {
      best:    { value: 'O(n)', note: 'A single pass marks every odd-indexed element for elimination. Always linear regardless of values.' },
      average: { value: 'O(n)', note: 'Exactly ⌊n/2⌋ elements are always eliminated — no branching, no comparisons, purely positional.' },
      worst:   { value: 'O(n)', note: 'No worst case in terms of time — but the output is almost always not sorted. That is the worst case for your data.' },
      space:   { value: 'O(1)', note: 'In-place. Elements are simply flagged as eliminated by their index position.' },
      stability: 'N/A',
      practical: 1,
      practicalNote: 'Eliminates half your data based purely on index position with zero regard for values. The remaining elements are sorted only by cosmic coincidence. Philosophically interesting, practically useless.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      yield { type: 'start', msg: `Scanning ${n} elements. Odd indices will not survive.` };

      let purged = 0;
      for (let i = 0; i < n; i++) {
        if (i % 2 === 1) {
          eliminated[i] = true;
          purged++;
          yield { type: 'eliminate', eliminated: [...eliminated], indices: [], msg: `Index ${i} (value ${arr[i]}) — odd. Purged.` };
        } else {
          yield { type: 'keep', indices: [i], eliminated: [...eliminated], msg: `Index ${i} (value ${arr[i]}) — even. Spared.` };
        }
      }

      // Check if what's left happens to be sorted
      const survivors = arr.filter((_, i) => !eliminated[i]);
      const isSorted = survivors.every((v, i, a) => i === 0 || a[i-1] <= v);

      yield {
        type: 'done',
        msg: isSorted
          ? `${purged} purged. ${survivors.length} remain — and by pure luck, they're sorted! 🎲`
          : `${purged} purged. ${survivors.length} remain — not sorted. As expected.`
      };
    }
  },

  communism: {
    name: 'Communism Sort',
    complexity: 'O(n²) redistributions',
    desc: 'Each bar shares its wealth with poorer neighbours, giving the most to the neediest. Repeated passes until all are equal — true communism. The array ends up flat.',
    analysis: {
      best:    { value: 'O(n)',  note: 'If all elements are already equal, a single pass confirms nothing needs redistributing.' },
      average: { value: 'O(n²)', note: 'Each pass moves value from rich to poor neighbours. Many passes are needed before the array fully levels out.' },
      worst:   { value: 'O(n²)', note: 'Maximally unequal input (e.g. [1, n]) requires the most passes to fully redistribute across all positions.' },
      space:   { value: 'O(1)', note: 'All redistribution happens in-place. No auxiliary storage required.' },
      stability: 'N/A',
      practical: 1,
      practicalNote: 'Does not sort — it equalises. Every element converges to the mean, destroying all information in the original data. Ideologically pure, computationally pointless.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      const total = arr.reduce((a, b) => a + b, 0);
      const mean = total / n;
      yield { type: 'start', msg: `Total wealth: ${total}. Equal share per element: ${mean.toFixed(2)}. Redistributing...` };

      let passes = 0;
      let changed = true;
      while (changed) {
        changed = false;
        passes++;
        for (let i = 0; i < n - 1; i++) {
          if (arr[i] > arr[i + 1]) {
            // Rich gives to poor neighbour
            const give = Math.ceil((arr[i] - arr[i + 1]) / 2);
            arr[i] -= give;
            arr[i + 1] += give;
            changed = true;
            yield { type: 'swap', l: i, h: i + 1, msg: `[${i}] gives ${give} to [${i+1}]. Now ${arr[i]} and ${arr[i+1]}.` };
          } else {
            yield { type: 'compare', l: i, h: i + 1, msg: `[${i}]=${arr[i]} already no richer than [${i+1}]=${arr[i+1]}.` };
          }
        }
        if (passes > 300) { yield { type: 'bail', msg: 'Redistribution stalled. Declaring equality by decree.' }; break; }
      }
      yield { type: 'done', msg: `Redistribution complete after ${passes} passes. All elements equalised.` };
    }
  },

  gamble: {
    name: 'Gamble Sort',
    complexity: 'O(n² x luck)',
    desc: 'Pick two random elements. Roll three dice. If you roll three of a kind, fully sort those two. If two match, swap them. Otherwise revert. Pray for jackpot.',
    analysis: {
      best:    { value: 'O(n²)', note: 'With perfect luck, every roll is a jackpot and pairs get sorted immediately. Still O(n²) pairs to resolve.' },
      average: { value: 'O(∞)',  note: 'Each roll has only a small chance of doing useful work. Expected number of rolls to sort grows astronomically with n.' },
      worst:   { value: 'O(∞)',  note: 'Could theoretically never sort if the dice perpetually refuse to cooperate. The house always wins.' },
      space:   { value: 'O(1)', note: 'In-place. Only needs two indices and three dice values.' },
      stability: 'Unstable',
      practical: 1,
      practicalNote: 'The only sorting algorithm that requires both a computer and a casino. Combines the unreliability of Bogo Sort with the drama of a slot machine. Not recommended for production.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      function isSorted(a) { for (let i = 0; i < a.length - 1; i++) if (a[i] > a[i+1]) return false; return true; }
      function roll() { return Math.floor(Math.random() * 6) + 1; }

      let attempts = 0;
      yield { type: 'start', msg: 'Stepping up to the table... 🎲' };

      while (!isSorted(arr) && attempts < 1500) {
        attempts++;
        const i = Math.floor(Math.random() * n);
        const j = Math.floor(Math.random() * n);
        if (i === j) continue;

        const dice = [roll(), roll(), roll()];
        const ones = dice.filter(d => d === dice[0]).length;

        yield { type: 'compare', l: i, h: j, msg: `Rolled [${dice.join(', ')}] on indices ${i} & ${j}` };

        if (ones === 3) {
          // Jackpot — properly place the smaller one
          if (arr[i] > arr[j]) { [arr[i], arr[j]] = [arr[j], arr[i]]; }
          yield { type: 'swap', l: i, h: j, msg: `JACKPOT! Three ${dice[0]}s — sorted pair (${arr[i]}, ${arr[j]})` };
        } else if (ones >= 2) {
          // Two matching — simple swap
          [arr[i], arr[j]] = [arr[j], arr[i]];
          yield { type: 'swap', l: i, h: j, msg: `Two ${dice[0]}s — swapped indices ${i} & ${j}` };
        } else {
          yield { type: 'check', msg: `No match — revert. House wins this round.` };
        }

        if (attempts > 1500) { yield { type: 'bail', msg: 'Ran out of chips after 1500 rolls.' }; break; }
      }

      if (isSorted(arr)) {
        yield { type: 'done', msg: `Sorted after ${attempts} rolls! The house lost today.` };
      } else {
        arr.sort((a, b) => a - b);
        yield { type: 'done', msg: `Gave up after ${attempts} rolls. Sorted manually. The house always wins.` };
      }
    }
  },

  adhd: {
    name: 'ADHD Sort',
    complexity: 'O(n² + distractions)',
    desc: 'Sorts a few elements, then gets distracted and makes a random swap. Then sorts a bit more. Then gets distracted again. Eventual convergence not guaranteed.',
    analysis: {
      best:    { value: 'O(n²)', note: 'If distraction swaps happen to never undo progress, it degrades to a noisy selection sort. Optimistic.' },
      average: { value: 'O(n² + distractions)', note: 'Each distraction undoes some sorting work, increasing the total number of passes needed. The more distractible, the longer it takes.' },
      worst:   { value: 'O(∞)',  note: 'If distractions consistently undo sorted regions, the algorithm may never converge. Relatable.' },
      space:   { value: 'O(1)', note: 'In-place. The chaos requires no auxiliary memory, only poor impulse control.' },
      stability: 'Unstable',
      practical: 1,
      practicalNote: 'A metaphor in code form. Does real sorting work interrupted by random chaos. Will eventually sort with enough patience, but the journey is exhausting to watch.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      function isSorted(a) { for (let i = 0; i < a.length - 1; i++) if (a[i] > a[i+1]) return false; return true; }

      let ops = 0;
      let sorted = 0;
      yield { type: 'start', msg: 'Starting to sort... oh wait, what was I doing?' };

      while (!isSorted(arr) && ops < 3000) {
        // Do some real sorting work — yield on every comparison to avoid blocking
        for (let j = sorted + 1; j < n; j++) {
          yield { type: 'compare', l: sorted, h: j, msg: `Focusing: comparing ${arr[sorted]} and ${arr[j]}` };
          if (arr[j] < arr[sorted]) {
            [arr[sorted], arr[j]] = [arr[j], arr[sorted]];
            ops++;
            yield { type: 'swap', l: sorted, h: j, msg: `Swapped. Making progress!` };
          }
        }
        sorted++;

        // Get distracted with 40% probability
        if (Math.random() < 0.4 && sorted < n - 1) {
          const a = Math.floor(Math.random() * n);
          const b = Math.floor(Math.random() * n);
          [arr[a], arr[b]] = [arr[b], arr[a]];
          ops++;
          sorted = Math.max(0, sorted - 1);
          yield { type: 'swap', l: a, h: b, msg: `Oh look, something shiny! Random swap at ${a} & ${b}. Lost focus.` };
        }
      }

      if (isSorted(arr)) {
        yield { type: 'done', msg: `Finally sorted after ${ops} operations. Took a while but we got there.` };
      } else {
        arr.sort((a, b) => a - b);
        yield { type: 'done', msg: `Too many distractions. Sorted manually after ${ops} ops.` };
      }
    }
  },

  anxiety: {
    name: 'Anxiety Sort',
    complexity: 'O(n² + paranoia)',
    desc: 'Sorts the array correctly on the first pass. Then checks it is still sorted. Then checks again. And again. Cannot stop checking. What if it changed?',
    analysis: {
      best:    { value: 'O(n log n)', note: 'The initial sort is a proper O(n log n). If the anxiety check count is fixed and small, that dominates.' },
      average: { value: 'O(n² + paranoia)', note: 'After sorting, it runs n repeated O(n) verification passes. The more anxious, the more passes, the worse the constant.' },
      worst:   { value: 'O(∞)',       note: 'If the check count is unbounded, the algorithm never terminates — perpetually verifying a sorted array that has not changed and never will.' },
      space:   { value: 'O(1)', note: 'No extra memory needed for the verification passes. The anxiety is purely psychological.' },
      stability: 'Stable',
      practical: 2,
      practicalNote: 'Technically correct — the best kind of correct. But wildly inefficient due to compulsive re-verification. A good metaphor for over-engineered validation logic in production systems.'
    },
    async* run(arr, mark) {
      const n = arr.length;
      yield { type: 'start', msg: 'Sorting array... this should be straightforward.' };

      // Actually sort it properly first
      arr.sort((a, b) => a - b);
      yield { type: 'recurse', l: 0, h: n - 1, msg: 'Sorted. Done. ...but what if it is not actually sorted?' };

      // Now compulsively re-verify
      const CHECK_PASSES = 20;
      for (let pass = 1; pass <= CHECK_PASSES; pass++) {
        let panic = false;
        for (let i = 0; i < n - 1; i++) {
          yield { type: 'compare', l: i, h: i + 1, msg: `Check #${pass}: verifying ${arr[i]} <= ${arr[i+1]}...` };
          if (arr[i] > arr[i + 1]) {
            panic = true;
            yield { type: 'swap', l: i, h: i + 1, msg: `PANIC! Out of order at ${i}! Re-sorting!` };
            arr.sort((a, b) => a - b);
            break;
          }
        }
        if (!panic) {
          if (pass < CHECK_PASSES) {
            yield { type: 'check', msg: `Pass ${pass} confirmed sorted. ...but what if something changed since last time?` };
          }
        }
      }

      yield { type: 'done', msg: `Verified sorted ${CHECK_PASSES} times. It is sorted. It was always sorted. Please believe that it is sorted.` };
    }
  }
};

// ─── STATE ────────────────────────────────────────────────────────────────────

// Algorithms where we can meaningfully track confirmed-sorted positions live
const POSITIONAL_ALGOS = new Set(['gnome', 'pancake', 'stooge', 'mergesort', 'quicksort', 'anxiety', 'adhd']);

let currentAlgo = 'mergesort';
let arr = [];
let highlights = {}; // index -> color
let eliminated = [];
let running = false;
let stopFlag = false;
let comparisons = 0, swaps = 0, ops = 0;
let animFrame;

// ─── CANVAS ───────────────────────────────────────────────────────────────────

const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawBars();
}

function getColor(i) {
  if (highlights[i]) return highlights[i];
  if (eliminated[i]) return 'rgba(58,26,42,0.6)';
  return null;
}

function getConfirmedSorted() {
  if (!running || !POSITIONAL_ALGOS.has(currentAlgo)) return new Set();
  const n = arr.length;
  const confirmed = new Set();
  // Confirmed sorted prefix: values equal to 1, 2, 3... from the left
  for (let i = 0; i < n; i++) {
    if (arr[i] === i + 1) confirmed.add(i);
    else break;
  }
  // Confirmed sorted suffix: values equal to n, n-1, n-2... from the right
  for (let i = n - 1; i >= 0; i--) {
    if (arr[i] === i + 1) confirmed.add(i);
    else break;
  }
  return confirmed;
}

function drawBars() {
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  if (!arr.length) return;

  const n = arr.length;
  const gap = Math.max(1, Math.floor(W / n * 0.1));
  const barW = (W - gap * (n + 1)) / n;
  const maxVal = Math.max(...arr);
  const confirmed = getConfirmedSorted();

  for (let i = 0; i < n; i++) {
    const x = gap + i * (barW + gap);
    const barH = (arr[i] / maxVal) * (H - 30);
    const y = H - barH - 10;

    // Algorithm highlight takes priority, then confirmed-sorted, then default
    const col = highlights[i] || (confirmed.has(i) ? '#a3e635' : null);

    if (eliminated[i]) {
      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      grad.addColorStop(0, '#5a1220');
      grad.addColorStop(1, '#280810');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, barW, barH);
      ctx.fillStyle = '#7a1828';
      ctx.fillRect(x, H - 12, barW, 2);
    } else {
      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      if (col) {
        grad.addColorStop(0, col);
        grad.addColorStop(1, col + '88');
      } else {
        // Unsorted: bright grey
        grad.addColorStop(0, '#9090a8');
        grad.addColorStop(1, '#484860');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, barW, barH);

      ctx.fillStyle = col ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.05)';
      ctx.fillRect(x, y, barW, 2);
    }
  }
}

// ─── ARRAY MANAGEMENT ─────────────────────────────────────────────────────────

function makeArray(n) {
  arr = Array.from({length: n}, (_, i) => i + 1);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  highlights = {};
  eliminated = new Array(n).fill(false);
  comparisons = swaps = ops = 0;
  updateStats();
  drawBars();
}

// ─── STATS & LOG ──────────────────────────────────────────────────────────────

function updateStats() {
  document.getElementById('statComp').textContent = comparisons.toLocaleString();
  document.getElementById('statSwap').textContent = swaps.toLocaleString();
  document.getElementById('statOps').textContent = ops.toLocaleString();
}

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML = `<span class="log-line">// ${msg}</span>`;
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + (state === 'running' ? 'running' : state === 'done' ? 'done' : '');
  txt.textContent = state === 'running' ? 'Running' : state === 'done' ? 'Done' : 'Ready';
}

// ─── RUNNER ───────────────────────────────────────────────────────────────────

const SPEED_LEVELS = [600, 200, 60, 20, 4];
const SPEED_LABELS = ['Slowest', 'Slow', 'Normal', 'Fast', 'Fastest'];
function getDelay() { return SPEED_LEVELS[parseInt(document.getElementById('speedSlider').value)]; }

async function runAlgo() {
  if (running) return;
  running = true;
  stopFlag = false;
  setStatus('running');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('resetBtn').disabled = true;
  document.getElementById('stopBtn').style.display = 'inline-block';

  const algo = ALGORITHMS[currentAlgo];
  const gen = algo.run(arr, (i, color) => { highlights[i] = color; });

  for await (const step of gen) {
    if (stopFlag) break;

    highlights = {};
    ops++;

    if (step.type === 'shuffle' || step.type === 'flip') {
      swaps += step.swaps || 1;
      // highlight all active
      arr.forEach((_, i) => { if (Math.random() < 0.3) highlights[i] = '#ff3c5f'; });
    }
    if (step.type === 'compare') {
      comparisons++;
      const idxs = step.indices || [step.pos, step.pos - 1] || [step.l, step.h];
      if (Array.isArray(idxs)) idxs.forEach(i => { if (i !== undefined) highlights[i] = '#ffdd00'; });
      if (step.l !== undefined) highlights[step.l] = '#ffdd00';
      if (step.h !== undefined) highlights[step.h] = '#ffdd00';
      if (step.pos !== undefined) { highlights[step.pos] = '#ffdd00'; if (step.pos > 0) highlights[step.pos-1] = '#ffdd00'; }
    }
    if (step.type === 'swap') {
      swaps++;
      const pos = step.pos;
      if (pos !== undefined) { highlights[pos] = '#ff3c5f'; if (pos > 0) highlights[pos-1] = '#ff3c5f'; }
      if (step.l !== undefined) highlights[step.l] = '#ff3c5f';
      if (step.h !== undefined) highlights[step.h] = '#ff3c5f';
    }
    if (step.type === 'keep' || step.type === 'after-snap') {
      if (step.indices) step.indices.forEach(i => { highlights[i] = '#a3e635'; });
    }
    if (step.type === 'eliminate' || step.type === 'snap') {
      if (step.eliminated) eliminated = [...step.eliminated];
      if (step.indices) step.indices.forEach(i => { if (!eliminated[i]) highlights[i] = '#a3e635'; });
    }
    if (step.type === 'sleep-place') {
      if (step.output) step.output.forEach((i, rank) => { highlights[i] = '#a3e635'; });
    }
    if (step.type === 'find-max') {
      highlights[step.maxIdx] = '#ffdd00';
    }
    if (step.type === 'miracle') {
      arr.forEach((_, i) => { highlights[i] = '#ffdd00'; });
    }
    if (step.type === 'done') {
      // If the step tells us exactly which indices survived (e.g. Thanos), use those directly
      if (step.activeIndices) {
        step.activeIndices.forEach(i => { highlights[i] = '#a3e635'; });
      } else {
        // Otherwise check only non-eliminated values
        const survivors = arr.filter((_, i) => !eliminated[i]);
        const sorted = survivors.every((v, i, a) => i === 0 || a[i-1] <= v);
        if (sorted) arr.forEach((_, i) => { if (!eliminated[i]) highlights[i] = '#a3e635'; });
      }
    }

    if (step.msg) log(step.msg);
    updateStats();
    drawBars();

    if (step.type !== 'done') await sleep(getDelay());
  }

  setStatus('done');
  running = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resetBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ─── UI SETUP ────────────────────────────────────────────────────────────────

function renderAnalysis(key) {
  const a = ALGORITHMS[key].analysis;
  const panel = document.getElementById('algoAnalysis');
  if (!a) { panel.innerHTML = ''; return; }

  function pips(score, max = 5) {
    return Array.from({length: max}, (_, i) =>
      `<div class="rating-pip${i < score ? ' on' : ''}"></div>`
    ).join('');
  }

  panel.innerHTML = `
    <div class="analysis-block">
      <div class="analysis-label">Best Case</div>
      <div class="analysis-value">${a.best.value}</div>
      <div class="analysis-note">${a.best.note}</div>
    </div>
    <div class="analysis-block">
      <div class="analysis-label">Average Case</div>
      <div class="analysis-value">${a.average.value}</div>
      <div class="analysis-note">${a.average.note}</div>
    </div>
    <div class="analysis-block">
      <div class="analysis-label">Worst Case</div>
      <div class="analysis-value">${a.worst.value}</div>
      <div class="analysis-note">${a.worst.note}</div>
    </div>
    <div class="analysis-block">
      <div class="analysis-label">Space</div>
      <div class="analysis-value">${a.space.value}</div>
      <div class="analysis-note">${a.space.note}</div>
    </div>
    <div class="analysis-block">
      <div class="analysis-label">Stability</div>
      <div class="analysis-value" style="color:${a.stability === 'Stable' ? 'var(--bar-sorted)' : a.stability === 'Unstable' ? 'var(--accent)' : 'var(--muted)'}">${a.stability}</div>
      <div class="analysis-note">Practicality rating</div>
      <div class="rating-bar">${pips(a.practical)}</div>
    </div>
    <div class="analysis-block" style="grid-column: span 2;">
      <div class="analysis-label">Practical Verdict</div>
      <div class="analysis-note" style="color:var(--text)">${a.practicalNote}</div>
    </div>
  `;
}

        result.append(val)

    <span class="tok-kw">for</span> val <span class="tok-kw">in</span> arr:
        t <span class="tok-op">=</span> threading.Thread(target<span class="tok-op">=</span>append_after, args<span class="tok-op">=</span>(val,))
        threads.append(t)
        t.start()

    <span class="tok-kw">for</span> t <span class="tok-kw">in</span> threads:
        t.join()

    <span class="tok-kw">return</span> result`,

  miracle: `\
<span class="tok-kw">def</span> <span class="tok-fn">miracle_sort</span>(arr):
    <span class="tok-cm"># Check if sorted. If not, wait for cosmic rays</span>
    <span class="tok-cm"># to flip bits in memory until it becomes sorted.</span>
    <span class="tok-kw">while not</span> <span class="tok-bi">all</span>(arr[i] <span class="tok-op">&lt;=</span> arr[i<span class="tok-op">+</span><span class="tok-num">1</span>]
                    <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-bi">len</span>(arr)<span class="tok-op">-</span><span class="tok-num">1</span>)):
        <span class="tok-kw">pass</span>  <span class="tok-cm"># just wait :)</span>
    <span class="tok-kw">return</span> arr`,

  gnome: `\
<span class="tok-kw">def</span> <span class="tok-fn">gnome_sort</span>(arr):
    pos <span class="tok-op">=</span> <span class="tok-num">0</span>
    <span class="tok-kw">while</span> pos <span class="tok-op">&lt;</span> <span class="tok-bi">len</span>(arr):
        <span class="tok-kw">if</span> pos <span class="tok-op">==</span> <span class="tok-num">0</span> <span class="tok-kw">or</span> arr[pos] <span class="tok-op">&gt;=</span> arr[pos <span class="tok-op">-</span> <span class="tok-num">1</span>]:
            pos <span class="tok-op">+=</span> <span class="tok-num">1</span>  <span class="tok-cm"># gnome moves forward</span>
        <span class="tok-kw">else</span>:
            arr[pos], arr[pos <span class="tok-op">-</span> <span class="tok-num">1</span>] <span class="tok-op">=</span> arr[pos <span class="tok-op">-</span> <span class="tok-num">1</span>], arr[pos]
            pos <span class="tok-op">-=</span> <span class="tok-num">1</span>  <span class="tok-cm"># gnome steps back</span>
    <span class="tok-kw">return</span> arr`,

  stooge: `\
<span class="tok-kw">def</span> <span class="tok-fn">stooge_sort</span>(arr, l<span class="tok-op">=</span><span class="tok-num">0</span>, h<span class="tok-op">=</span><span class="tok-bool">None</span>):
    <span class="tok-kw">if</span> h <span class="tok-kw">is</span> <span class="tok-bool">None</span>:
        h <span class="tok-op">=</span> <span class="tok-bi">len</span>(arr) <span class="tok-op">-</span> <span class="tok-num">1</span>
    <span class="tok-kw">if</span> arr[l] <span class="tok-op">&gt;</span> arr[h]:
        arr[l], arr[h] <span class="tok-op">=</span> arr[h], arr[l]
    <span class="tok-kw">if</span> h <span class="tok-op">-</span> l <span class="tok-op">+</span> <span class="tok-num">1</span> <span class="tok-op">&gt;</span> <span class="tok-num">2</span>:
        t <span class="tok-op">=</span> (h <span class="tok-op">-</span> l <span class="tok-op">+</span> <span class="tok-num">1</span>) <span class="tok-op">//</span> <span class="tok-num">3</span>
        stooge_sort(arr, l,     h <span class="tok-op">-</span> t)
        stooge_sort(arr, l <span class="tok-op">+</span> t, h    )
        stooge_sort(arr, l,     h <span class="tok-op">-</span> t)
    <span class="tok-kw">return</span> arr`,

  pancake: `\
<span class="tok-kw">def</span> <span class="tok-fn">pancake_sort</span>(arr):
    <span class="tok-kw">def</span> <span class="tok-fn">flip</span>(a, k):
        a[<span class="tok-op">:</span>k<span class="tok-op">+</span><span class="tok-num">1</span>] <span class="tok-op">=</span> a[<span class="tok-op">:</span>k<span class="tok-op">+</span><span class="tok-num">1</span>][<span class="tok-op">::-</span><span class="tok-num">1</span>]

    <span class="tok-kw">for</span> size <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-bi">len</span>(arr), <span class="tok-num">1</span>, <span class="tok-op">-</span><span class="tok-num">1</span>):
        max_idx <span class="tok-op">=</span> arr.index(<span class="tok-bi">max</span>(arr[<span class="tok-op">:</span>size]))
        <span class="tok-kw">if</span> max_idx <span class="tok-op">!=</span> size <span class="tok-op">-</span> <span class="tok-num">1</span>:
            <span class="tok-kw">if</span> max_idx <span class="tok-op">!=</span> <span class="tok-num">0</span>:
                flip(arr, max_idx)
            flip(arr, size <span class="tok-op">-</span> <span class="tok-num">1</span>)
    <span class="tok-kw">return</span> arr`,

<span class="tok-kw">def</span> <span class="tok-fn">genghis_sort</span>(arr):
    <span class="tok-cm"># Conquer. Keep only the first. Repopulate.</span>
    first <span class="tok-op">=</span> arr[<span class="tok-num">0</span>]
    n     <span class="tok-op">=</span> <span class="tok-bi">len</span>(arr)
    <span class="tok-kw">return</span> [first <span class="tok-op">+</span> i <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-bi">range</span>(n)]`,

<span class="tok-kw">def</span> <span class="tok-fn">odd_purge_sort</span>(arr):

    <span class="tok-kw">return</span> [arr[i] <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-bi">len</span>(arr)) <span class="tok-kw">if</span> i <span class="tok-op">%</span> <span class="tok-num">2</span> <span class="tok-op">==</span> <span class="tok-num">0</span>]`,

  communism: `\
<span class="tok-kw">def</span> <span class="tok-fn">communism_sort</span>(arr):
    <span class="tok-cm"># Each element shares with its poorer neighbour</span>
    <span class="tok-cm"># until all wealth is equal.</span>
    changed <span class="tok-op">=</span> <span class="tok-bool">True</span>
    <span class="tok-kw">while</span> changed:
        changed <span class="tok-op">=</span> <span class="tok-bool">False</span>
        <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-bi">len</span>(arr) <span class="tok-op">-</span> <span class="tok-num">1</span>):
            <span class="tok-kw">if</span> arr[i] <span class="tok-op">&gt;</span> arr[i <span class="tok-op">+</span> <span class="tok-num">1</span>]:
                give <span class="tok-op">=</span> (arr[i] <span class="tok-op">-</span> arr[i <span class="tok-op">+</span> <span class="tok-num">1</span>]) <span class="tok-op">//</span> <span class="tok-num">2</span>
                arr[i]     <span class="tok-op">-=</span> give
                arr[i <span class="tok-op">+</span> <span class="tok-num">1</span>] <span class="tok-op">+=</span> give
                changed <span class="tok-op">=</span> <span class="tok-bool">True</span>
    <span class="tok-kw">return</span> arr`,

  gamble: `\
<span class="tok-kw">import</span> random

<span class="tok-kw">def</span> <span class="tok-fn">gamble_sort</span>(arr):
    <span class="tok-kw">def</span> <span class="tok-fn">is_sorted</span>(a):
        <span class="tok-kw">return</span> <span class="tok-bi">all</span>(a[i]<span class="tok-op">&lt;=</span>a[i<span class="tok-op">+</span><span class="tok-num">1</span>] <span class="tok-kw">for</span> i <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-bi">len</span>(a)<span class="tok-op">-</span><span class="tok-num">1</span>))

    <span class="tok-kw">while not</span> is_sorted(arr):
        i, j <span class="tok-op">=</span> random.sample(<span class="tok-bi">range</span>(<span class="tok-bi">len</span>(arr)), <span class="tok-num">2</span>)
        dice <span class="tok-op">=</span> [random.randint(<span class="tok-num">1</span>, <span class="tok-num">6</span>) <span class="tok-kw">for</span> _ <span class="tok-kw">in</span> <span class="tok-bi">range</span>(<span class="tok-num">3</span>)]
        ones <span class="tok-op">=</span> dice.count(dice[<span class="tok-num">0</span>])
        <span class="tok-kw">if</span> ones <span class="tok-op">==</span> <span class="tok-num">3</span>:  <span class="tok-cm"># jackpot</span>
            <span class="tok-kw">if</span> arr[i] <span class="tok-op">&gt;</span> arr[j]:
                arr[i], arr[j] <span class="tok-op">=</span> arr[j], arr[i]
        <span class="tok-kw">elif</span> ones <span class="tok-op">&gt;=</span> <span class="tok-num">2</span>:
            arr[i], arr[j] <span class="tok-op">=</span> arr[j], arr[i]
    <span class="tok-kw">return</span> arr`,

<span class="tok-kw">import</span> random

<span class="tok-kw">def</span> <span class="tok-fn">adhd_sort</span>(arr):

function renderCode(key) {
  const block = document.getElementById('codeBlock');
  const code = PYTHON_CODE[key];
  if (!code) {
    block.innerHTML = '<span class="tok-cm"># No Python implementation available for this algorithm.</span>';
    return;
  }
  // Wrap bare (unspanned) def/function-name lines in colour
  // The strings already contain pre-rendered span tags; just output directly
  block.innerHTML = `<span class="tok-kw">def</span> <span class="tok-fn">${key.replace('sort','').replace('mergesort','merge_sort').replace('quicksort','quick_sort')}</span>` + '\n' + code;
  // Actually just set directly — code strings are already fully highlighted
  block.innerHTML = code;
}

function buildSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const LEGIT = ['mergesort', 'quicksort'];

  const legit = Object.entries(ALGORITHMS).filter(([k]) => LEGIT.includes(k));
  const unconventional = Object.entries(ALGORITHMS)
    .filter(([k]) => !LEGIT.includes(k))
    .sort(([, a], [, b]) => a.name.localeCompare(b.name));

  // Add "efficient" label + legit sorts
  legit.forEach(([key, algo]) => {
    const btn = document.createElement('button');
    btn.className = 'algo-btn' + (key === currentAlgo ? ' active' : '');
    btn.dataset.key = key;
    btn.innerHTML = `<span class="algo-name">${algo.name}</span><span class="complexity">${algo.complexity}</span>`;
    btn.addEventListener('click', () => selectAlgo(key));
    sidebar.appendChild(btn);
  });

  // Divider
  const sep = document.createElement('div');
  sep.className = 'sidebar-sep';
  sep.innerHTML = '<span>unconventional</span>';
  sidebar.appendChild(sep);

  // Unconventional sorts A-Z
  unconventional.forEach(([key, algo]) => {
    const btn = document.createElement('button');
    btn.className = 'algo-btn' + (key === currentAlgo ? ' active' : '');
    btn.dataset.key = key;
    btn.innerHTML = `<span class="algo-name">${algo.name}</span><span class="complexity">${algo.complexity}</span>`;
    btn.addEventListener('click', () => selectAlgo(key));
    sidebar.appendChild(btn);
  });
}

function selectAlgo(key) {
  if (running) return;
  currentAlgo = key;
  document.querySelectorAll('.algo-btn').forEach(b => b.classList.toggle('active', b.dataset.key === key));
  document.getElementById('algoTitle').textContent = ALGORITHMS[key].name.toUpperCase();
  document.getElementById('algoDesc').textContent = ALGORITHMS[key].desc;
  renderAnalysis(key);
  renderCode(key);
  const n = parseInt(document.getElementById('sizeSlider').value);
  makeArray(n);
  setStatus('ready');
  log('Algorithm selected. Press Sort to begin.');
}

document.getElementById('stopBtn').addEventListener('click', () => {
  if (!running) return;
  stopFlag = true;
  running = false;
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('resetBtn').disabled = false;
  setStatus('ready');
  log('Sorting cancelled. Press Sort to try again, or Reset for a new array.');
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (!running) runAlgo();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  stopFlag = true;
  running = false;
  setTimeout(() => {
    const n = parseInt(document.getElementById('sizeSlider').value);
    makeArray(n);
    setStatus('ready');
    log('Array reset. Press Sort to begin.');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('resetBtn').disabled = false;
  }, 100);
});

const slider = document.getElementById('sizeSlider');
slider.addEventListener('input', () => {
  if (running) return;
  document.getElementById('sizeVal').textContent = slider.value;
  makeArray(parseInt(slider.value));
});

document.getElementById('speedSlider').addEventListener('input', function() {
  document.getElementById('speedVal').textContent = SPEED_LABELS[parseInt(this.value)];
});

window.addEventListener('resize', resizeCanvas);

// ─── INIT ────────────────────────────────────────────────────────────────────

buildSidebar();
selectAlgo('mergesort');
setTimeout(resizeCanvas, 100);

// Sync slider labels to their initial values on load
document.getElementById('sizeVal').textContent = document.getElementById('sizeSlider').value;
document.getElementById('speedVal').textContent = SPEED_LABELS[parseInt(document.getElementById('speedSlider').value)];
</script>
